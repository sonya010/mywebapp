services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: tasktracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webapp_network
    ports:
      - "5433:5432"

  webapp:
    build: .
    restart: always
    depends_on:
      - db
    networks:
      - webapp_network
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - webapp
    networks:
      - webapp_network

networks:
  webapp_network:
    driver: bridge

volumes:
  postgres_data: